<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders - Fashion</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <nav>
      <div class="logo">FASHION</div>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="auth-icon">
        <div class="user-menu-container" id="userMenu">
          <button id="userMenuButton" class="user-avatar">
            <img src="https://i.pravatar.cc/40" alt="User Avatar" />
          </button>
          <div id="userDropdown" class="user-dropdown hidden">
            <button class="btn authBtn" id="userGreeting"></button>
            <a class="btn" href="myorders.html">Orders</a>
            <a class="btn" href="#">Profile</a>
            <a class="btn" href="#">Settings</a>
            <button class="btn" id="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>
        <div>
          <button class="btn authBtn" id="login-btn"><a href="login.html">Login</a></button>
          <button class="btn authBtn" id="register-btn"><a href="register.html">Register</a></button>
        </div>
        <div class="icons">
          <div class="menu-toggle" id="menu-toggle">&#9776;</div>
          <a href="cart.html" class="cart-icon">
            <img src="https://img.icons8.com/ios-filled/24/shopping-bag.png" alt="Cart" />
            <span class="cart-count" id="cartCount">0</span>
          </a>
        </div>
      </div>
    </nav>

    <section class="container orders-page">
      <h1>My Orders</h1>
      <div id="ordersContainer" class="orders-container"></div>
    </section>

    <footer class="container site-footer">
      <div class="footer-content">
        <div class="footer-column">
          <h4>About FASHION</h4>
          <p>Your brand's story, values, and mission go here.</p>
        </div>
        <div class="footer-column">
          <h4>Quick Links</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#">FAQs</a></li>
          </ul>
        </div>
        <div class="footer-column">
          <h4>Follow Us</h4>
          <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom"><p>&copy; 2026 Your Brand. All rights reserved.</p></div>
    </footer>

    <script src="navbar.js"></script>
    <script>
      const ordersContainer = document.getElementById("ordersContainer");
      const orders = JSON.parse(localStorage.getItem("orders") || "[]");
      if (!orders.length) {
        ordersContainer.innerHTML = `<p class="empty-message">No orders found yet. Start shopping to place your first order.</p>`;
      } else {
        ordersContainer.innerHTML = orders
          .map(
            (order) => `
              <div class="order-card">
                <h3>Order #${order.id}</h3>
                <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString() || "N/A"}</p>
                <p><strong>Total:</strong> $${Number(order.totalPrice || 0).toFixed(2)}</p>
                <a class="btn" href="order.html?orderId=${order.id}">View Details</a>
              </div>
            `
          )
          .join("");
      }
    </script>
  </body>
</html>
